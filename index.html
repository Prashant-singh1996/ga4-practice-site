<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA4 Practice Store</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Arial, sans-serif; color: #1a1a1a; line-height: 1.5; }
  header { background: #1F4E78; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  header .logo { font-weight: 700; font-size: 20px; }
  header button { background: #fff; color: #1F4E78; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; }
  .hero { padding: 60px 24px; text-align: center; background: #f4f6f8; }
  .hero h1 { font-size: 32px; margin-bottom: 12px; }
  .hero p { color: #555; margin-bottom: 24px; }
  .hero button { background: #2e7d32; color: #fff; border: none; padding: 14px 32px; font-size: 16px; border-radius: 6px; cursor: pointer; }
  .products { padding: 50px 24px; max-width: 900px; margin: 0 auto; }
  .products h2 { margin-bottom: 24px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
  .card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 20px; text-align: center; }
  .card h3 { margin-bottom: 6px; }
  .card .price { color: #2e7d32; font-weight: 700; margin-bottom: 14px; }
  .card button { background: #1F4E78; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; }
  .contact { background: #f4f6f8; padding: 50px 24px; }
  .contact-form { max-width: 420px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 10px; border: 1px solid #e0e0e0; }
  .contact-form input, .contact-form textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
  .contact-form button { background: #2e7d32; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 15px; }
  footer { background: #1a1a1a; color: #ccc; padding: 30px 24px; text-align: center; }
  footer button { background: transparent; border: 1px solid #888; color: #ccc; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
  .debug-box { position: fixed; bottom: 0; left: 0; right: 0; background: #111; color: #0f0; font-family: monospace; font-size: 12px; max-height: 160px; overflow-y: auto; padding: 8px 12px; display: none; }
  .debug-box.active { display: block; }
  .debug-toggle { position: fixed; bottom: 10px; right: 10px; z-index: 10; background: #333; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P3M9GPB"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<header>
  <div class="logo">PracticeStore</div>
  <button data-cta="header_buy_now" data-location="Header">Buy Now</button>
</header>

<section class="hero">
  <h1>Build Your GA4 Tracking Skills</h1>
  <p>Click around this page to generate real events for your tagging sheet.</p>
  <button data-cta="hero_buy_now" data-location="Hero Section">Buy Now</button>
</section>

<section class="products">
  <h2>Our Products</h2>
  <div class="product-grid">
    <div class="card">
      <h3>Starter Plan</h3>
      <div class="price">₹999</div>
      <button data-cta="select_item" data-item="Starter Plan" data-value="999" data-location="Pricing Card - Starter">Get Started</button>
    </div>
    <div class="card">
      <h3>Pro Plan</h3>
      <div class="price">₹2499</div>
      <button data-cta="select_item" data-item="Pro Plan" data-value="2499" data-location="Pricing Card - Pro">Get Started</button>
    </div>
    <div class="card">
      <h3>Enterprise Plan</h3>
      <div class="price">₹4999</div>
      <button data-cta="select_item" data-item="Enterprise Plan" data-value="4999" data-location="Pricing Card - Enterprise">Get Started</button>
    </div>
  </div>
</section>

<section class="contact">
  <div class="contact-form">
    <h2 style="margin-bottom:16px;">Contact Us</h2>
    <input type="text" id="contact-name" placeholder="Your Name">
    <input type="email" id="contact-email" placeholder="Your Email">
    <textarea id="contact-message" rows="4" placeholder="Message"></textarea>
    <button id="contact-submit" data-location="Contact Form">Submit</button>
  </div>
</section>

<footer>
  <p>PracticeStore &copy; 2026 — GA4 Practice Site</p>
  <button data-cta="footer_buy_now" data-location="Footer">Buy Now</button>
</footer>

<button class="debug-toggle" onclick="document.querySelector('.debug-box').classList.toggle('active')">Show dataLayer Log</button>
<div class="debug-box"></div>

<script>
  window.dataLayer = window.dataLayer || [];

  function logToDebugBox(obj) {
    const box = document.querySelector('.debug-box');
    const line = document.createElement('div');
    line.textContent = JSON.stringify(obj);
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  function pushDataLayer(obj) {
    window.dataLayer.push(obj);
    logToDebugBox(obj);
    console.log('dataLayer push:', obj);
  }

  // Generic "Buy Now" buttons (header, hero, footer) -> generate_lead event
  document.querySelectorAll('button[data-cta$="_buy_now"]').forEach(btn => {
    btn.addEventListener('click', () => {
      pushDataLayer({
        event: 'generate_lead',
        button_text: btn.textContent.trim(),
        cta_location: btn.dataset.location,
        form_name: 'hero_lead_form'
      });
      alert('Event pushed to dataLayer: generate_lead (check GTM Preview / debug box)');
    });
  });

  // Pricing card buttons -> select_item event
  document.querySelectorAll('button[data-cta="select_item"]').forEach(btn => {
    btn.addEventListener('click', () => {
      pushDataLayer({
        event: 'select_item',
        item_name: btn.dataset.item,
        value: btn.dataset.value,
        cta_location: btn.dataset.location
      });
      alert('Event pushed to dataLayer: select_item (' + btn.dataset.item + ')');
    });
  });

  // Contact form submit -> form_submit event
  document.getElementById('contact-submit').addEventListener('click', (e) => {
    e.preventDefault();
    pushDataLayer({
      event: 'form_submit',
      form_id: 'contact_footer_form',
      form_name: 'Contact Form'
    });
    alert('Event pushed to dataLayer: form_submit');
  });
</script>

</body>
</html>
